<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion — DepliantApp</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1a3c6e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="DepliantApp">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="icon" href="/icon-192.png">
<style>
  :root { --bleu: #1a3c6e; --bleu-clair: #eaf0fa; --gris: #666; --bordure: #ddd; --danger: #b23b3b; }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    background: linear-gradient(160deg, #1a3c6e 0%, #2a5a9e 55%, #0f2547 100%);
    color: #222;
  }
  .carte {
    background: white; border-radius: 12px; padding: 32px; width: 100%; max-width: 360px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.25);
  }
  h1 { font-size: 1.3rem; color: var(--bleu); margin: 0 0 4px 0; text-align: center; }
  p.sous-titre { color: var(--gris); font-size: 0.85rem; text-align: center; margin: 0 0 20px 0; }
  label { display: block; font-size: 0.85rem; color: #333; margin-bottom: 4px; margin-top: 12px; }
  input {
    width: 100%; padding: 9px 10px; border: 1px solid var(--bordure); border-radius: 6px;
    font-size: 0.95rem;
  }
  input:focus { outline: 2px solid var(--bleu-clair); border-color: var(--bleu); }
  button {
    width: 100%; margin-top: 18px; padding: 10px; border: none; border-radius: 6px;
    background: var(--bleu); color: white; font-size: 0.95rem; font-weight: 600; cursor: pointer;
  }
  button:hover { background: #14315c; }
  button:disabled { opacity: 0.6; cursor: default; }
  .erreur {
    background: #fdeaea; border: 1px solid var(--danger); color: var(--danger);
    border-radius: 6px; padding: 8px 10px; font-size: 0.85rem; margin-top: 14px; display: none;
  }
  .erreur.visible { display: block; }
  .hint { font-size: 0.78rem; color: var(--gris); margin-top: 10px; line-height: 1.4; }
  .hidden { display: none; }
  .champ-mdp { position: relative; }
  .champ-mdp input { padding-right: 34px; }
  .btn-voyant-mdp {
    position: absolute; right: 2px; top: 1px; width: auto; margin: 0;
    background: none; border: none; padding: 8px; font-size: 1rem;
    line-height: 1; cursor: pointer; color: var(--gris);
  }
  .btn-voyant-mdp:hover { background: none; color: var(--bleu); }
  
  /* Spinner */
  .spinner {
    display: inline-block; width: 13px; height: 13px; margin-right: 6px;
    border: 2px solid rgba(255,255,255,0.5); border-top-color: currentColor;
    border-radius: 50%; vertical-align: middle; animation: spinner-rotation 0.7s linear infinite;
  }
  @keyframes spinner-rotation { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <div class="carte">
    <h1>DepliantApp</h1>
    <p class="sous-titre">Connexion chorale ou administration</p>

    <form id="form-login">
      <label for="login-username">Identifiant</label>
      <input id="login-username" type="text" autocomplete="username" required autofocus>
      <label for="login-password">Mot de passe</label>
      <div class="champ-mdp">
        <input id="login-password" type="password" autocomplete="current-password" required>
        <button type="button" class="btn-voyant-mdp" aria-label="Afficher le mot de passe">👁</button>
      </div>
      <div class="erreur" id="login-erreur"></div>
      <button type="submit">Se connecter</button>
    </form>

    <form id="form-changement" class="hidden">
      <p class="hint" style="margin-bottom:16px;">Mot de passe temporaire détecté : vous devez définir un nouveau mot de passe personnalisé avant de continuer.</p>
      <input id="chg-actuel" type="hidden">
      
      <label for="chg-nouveau">Nouveau mot de passe personnalisé (8 caractères min.)</label>
      <div class="champ-mdp">
        <input id="chg-nouveau" type="password" autocomplete="new-password" required minlength="8">
        <button type="button" class="btn-voyant-mdp" aria-label="Afficher le mot de passe">👁</button>
      </div>
      <label for="chg-confirme">Confirmer le nouveau mot de passe</label>
      <div class="champ-mdp">
        <input id="chg-confirme" type="password" autocomplete="new-password" required minlength="8">
        <button type="button" class="btn-voyant-mdp" aria-label="Afficher le mot de passe">👁</button>
      </div>
      <div class="erreur" id="chg-erreur"></div>
      <button type="submit">Enregistrer et continuer</button>
    </form>
  </div>

<script>
async function api(url, options = {}) {
  const res = await fetch(url, { ...options, headers: { "Content-Type": "application/json", ...(options.headers || {}) } });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.detail || "Erreur");
  return data;
}

function afficherErreur(id, message) {
  const el = document.getElementById(id);
  el.textContent = message;
  el.classList.add("visible");
}
function masquerErreur(id) {
  document.getElementById(id).classList.remove("visible");
}

document.querySelectorAll(".btn-voyant-mdp").forEach((btn) => {
  btn.addEventListener("click", () => {
    const input = btn.previousElementSibling;
    const visible = input.type === "text";
    input.type = visible ? "password" : "text";
    btn.textContent = visible ? "👁" : "🙈";
    btn.setAttribute("aria-label", visible ? "Afficher le mot de passe" : "Masquer le mot de passe");
  });
});

async function avecChargement(bouton, fn) {
  if (!bouton || bouton.disabled) return fn();
  const contenuOriginal = bouton.innerHTML;
  bouton.disabled = true;
  bouton.innerHTML = `<span class="spinner" aria-hidden="true"></span>${contenuOriginal}`;
  try {
    return await fn();
  } finally {
    bouton.disabled = false;
    bouton.innerHTML = contenuOriginal;
  }
}

let dernierMotDePasseSaisi = "";

document.getElementById("form-login").addEventListener("submit", async (e) => {
  e.preventDefault();
  masquerErreur("login-erreur");
  const username = document.getElementById("login-username").value;
  const password = document.getElementById("login-password").value;
  const submitBtn = e.target.querySelector('button[type="submit"]');
  try {
    const data = await avecChargement(submitBtn, () => api("/auth/login", { method: "POST", body: JSON.stringify({ username, password }) }));
    if (data.must_change_password) {
      dernierMotDePasseSaisi = password;
      document.getElementById("form-login").classList.add("hidden");
      document.getElementById("form-changement").classList.remove("hidden");
      document.getElementById("chg-actuel").value = password;
    } else {
      window.location.href = "/";
    }
  } catch (err) {
    afficherErreur("login-erreur", err.message);
  }
});

document.getElementById("form-changement").addEventListener("submit", async (e) => {
  e.preventDefault();
  masquerErreur("chg-erreur");
  const actuel = dernierMotDePasseSaisi || document.getElementById("chg-actuel").value;
  const nouveau = document.getElementById("chg-nouveau").value;
  const confirme = document.getElementById("chg-confirme").value;
  if (nouveau !== confirme) {
    afficherErreur("chg-erreur", "Les deux mots de passe ne correspondent pas.");
    return;
  }
  const submitBtn = e.target.querySelector('button[type="submit"]');
  try {
    await avecChargement(submitBtn, () => api("/auth/change-password", {
      method: "POST",
      body: JSON.stringify({ mot_de_passe_actuel: actuel, nouveau_mot_de_passe: nouveau }),
    }));
    window.location.href = "/";
  } catch (err) {
    afficherErreur("chg-erreur", err.message);
  }
});
</script>
</body>
</html>
